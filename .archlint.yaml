  god_class:
    level: telemetry
    exclude:
    - internal/analyzer.GoAnalyzer
    - internal/mcp.FileMetrics
    - demo/internal/model.User
  hub_node:
    level: telemetry
    exclude:
    - internal/mcp.ComputeFileMetrics
    - internal/mcp.matchesFile
    - pkg/bpmn.collectElements
  srp:
    level: telemetry
    exclude:
    - internal/cli.batchRepoResult
    - internal/cli.packageMetrics
    - internal/cli.selfScanResult
    - internal/mcp.FileMetrics
    - pkg/callgraph.CallGraph
    - internal/analyzer.GoAnalyzer
    - internal/archlintcfg.Config
    - internal/mcp.Server
    - internal/mcp.State
    - pkg/callgraph.CallWalker
    - pkg/callgraph.SequenceGenerator
    - demo/internal/config.DefaultConfig
    - demo/internal/model.User
  max_fan_out:
    enabled: true
    threshold: 10
    error_on_violation: true
    exclude:
    - archlint-rs::src::main
    - archlint-rs::src::analyzer
  coupling:
    enabled: true
    error_on_violation: true
    params:
      ca_threshold: 10
      ce_threshold: 10
    exclude:
    - internal/analyzer
    - serde
    - tests
    - archlint-rs::src::main
    - archlint-rs::src::analyzer
  hub_nodes:
    enabled: true
    threshold: 10
    error_on_violation: false
    exclude:
    - archlint-rs::src::main
    - archlint-rs::src::analyzer
    - internal/analyzer
    - tests
    - serde
  orphan_nodes:
    enabled: true
    error_on_violation: false
    exclude:
    - pkg::archtest::archtest
    - pkg::bpmn::types
    - pkg::bpmn::graph
    - pkg::bpmn::adapter_test
    - pkg::bpmn::graph_test
    - pkg::bpmn::adapter
    - pkg::callgraph::sequence
    - pkg::callgraph::model
    - pkg::callgraph::sequence_test
    - pkg::callgraph::export
    - pkg::callgraph::errors
    - pkg::callgraph::testdata::sample::cycle
    - pkg::callgraph::testdata::sample::service
    - pkg::callgraph::testdata::sample::empty
    - pkg::callgraph::export_test
    - internal::mcp::tool_analyze_file
    - internal::mcp::server_test
    - internal::mcp::tool_callgraph
    - internal::mcp::tool_metrics
    - internal::mcp::tool_dependencies
  layer_violations:
    enabled: true
    error_on_violation: false  # tracked debt: pkg/callgraph -> internal/analyzer (see TODO below)
    exclude:
      # pkg/callgraph uses internal/analyzer types (CallInfo, FunctionInfo, MethodInfo).
      # Fix: move shared types to internal/model. Tracked as architectural debt.
      - pkg::callgraph::resolver
      - pkg::callgraph::builder
      - pkg::callgraph::builder_test
      - pkg::callgraph::walker
      - pkg::callgraph::event_builder
    params:
      layers:
        cmd: 0
        api: 1
        handler: 1
        controller: 1
        service: 2
        usecase: 2
        internal: 2
        domain: 3
        entity: 3
        model: 3
        repository: 4
        storage: 4
        infrastructure: 5
        pkg: 6
