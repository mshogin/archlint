rules:
  fan_out:
    level: taboo
    threshold: 10
    exclude:
    - internal/cli
    - internal/mcp
  fan_in:
    level: telemetry
    threshold: 20
  cycles:
    level: taboo
  isp:
    level: telemetry
    threshold: 5
  dip:
    level: telemetry
    exclude:
    - pkg/callgraph.Builder
    - pkg/callgraph.CallResolver
    - pkg/callgraph.CallWalker
    - pkg/callgraph.EventBuilder
    - demo/internal/handler.UserHandler
    - demo/internal/repo.CachedRepo
    - demo/internal/repo.UserRepo
    - internal/cli.batchRepoResult
    - internal/cli.checkResult
    - internal/cli.scanGateResult
    - internal/analyzer.GoAnalyzer
    - internal/analyzer.RustAnalyzer
    - internal/bot.ScanResult
    - internal/mcp.State
    - internal/mcp.Watcher
    - internal/watcher.Watcher
  feature_envy:
    level: telemetry
    exclude:
    - internal/analyzer.GoAnalyzer.Analyze
    - internal/analyzer.GoAnalyzer.buildGraph
    - internal/analyzer.GoAnalyzer.collectCalls
    - internal/analyzer.GoAnalyzer.extractCallInfo
    - internal/analyzer.GoAnalyzer.getPkgID
    - internal/analyzer.GoAnalyzer.getTypeName
    - internal/analyzer.GoAnalyzer.isStdLib
    - internal/analyzer.GoAnalyzer.parseFile
    - internal/analyzer.GoAnalyzer.parseFuncDecl
    - internal/analyzer.GoAnalyzer.parseTypeDecl
    - internal/analyzer.GoAnalyzer.resolveCallTarget
    - internal/analyzer.GoAnalyzer.resolveTypeDependency
    - internal/analyzer.RustAnalyzer.Analyze
    - internal/analyzer.RustAnalyzer.parseCargo
    - internal/analyzer.RustAnalyzer.parseRustFile
    - internal/analyzer.RustAnalyzer.parseWorkspace
    - internal/archlintcfg.Config.LayerForModule
    - internal/bot.Bot.Run
    - internal/bot.Bot.poll
    - internal/bot.Bot.process
    - internal/bot.HTTPGitHubClient.CloseIssue
    - internal/bot.HTTPGitHubClient.ListOpenIssues
    - internal/bot.HTTPGitHubClient.PostComment
    - internal/bot.HTTPGitHubClient.do
    - internal/bot.LocalScanner.Scan
    - internal/bot.LocalScanner.runExternalBinary
    - internal/mcp.DegradationDetector.Check
    - internal/mcp.Server.Run
    - internal/mcp.Server.handleInitialize
    - internal/mcp.Server.handleMessage
    - internal/mcp.Server.handleToolsCall
    - internal/mcp.Server.readMessage
    - internal/mcp.Server.sendDegradationNotification
    - internal/mcp.Server.startWatcher
    - internal/mcp.Server.writeMessage
    - internal/mcp.State.FileNodeIDs
    - internal/mcp.State.GetDegradationReport
    - internal/mcp.State.GetGraph
    - internal/mcp.State.Initialize
    - internal/mcp.State.InitializeMetricsBaseline
    - internal/mcp.State.Reparse
    - internal/mcp.State.ReparseFile
    - internal/mcp.State.buildFileNodeIndex
    - internal/mcp.Watcher.run
    - internal/watcher.Debouncer.FileChanged
    - internal/watcher.Debouncer.Stop
    - internal/watcher.Debouncer.fire
    - internal/watcher.Watcher.Start
    - internal/watcher.Watcher.addDirs
    - internal/watcher.Watcher.tryAddDir
    - pkg/archtest.ArchResult.AssertHealthScore
    - pkg/archtest.ArchResult.AssertMaxFanOut
    - pkg/archtest.ArchResult.AssertMaxViolations
    - pkg/archtest.ArchResult.AssertNoCircularDependencies
    - pkg/bpmn.ProcessGraph.Validate
    - pkg/callgraph.Builder.buildGraph
    - pkg/callgraph.CallResolver.Resolve
    - pkg/callgraph.CallWalker.walk
    - pkg/callgraph.EventBuilder.BuildForContext
    - pkg/callgraph.SequenceGenerator.Generate
    - pkg/callgraph.SequenceGenerator.writeEdges
    - pkg/callgraph.SequenceGenerator.writeFlatParticipants
    - pkg/callgraph.SequenceGenerator.writeGroupedParticipants
    - pkg/callgraph.YAMLExporter.writeYAML
    - callgraph/testdata/sample.Service.Process
    - demo/internal/handler.UserHandler.CreateUser
    - demo/internal/handler.UserHandler.GetUser
    - demo/internal/handler.UserHandler.writeError
    - demo/internal/model.User.Validate
    - demo/internal/repo.CachedRepo.GetCached
