name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Self-check
        run: |
          go build -o bin/archlint ./cmd/archlint/
          bin/archlint collect . -o /tmp/arch.yaml
          echo "Self-check passed"
