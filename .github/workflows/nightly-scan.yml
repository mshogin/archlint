name: Nightly Architecture Scan
on:
  schedule:
    - cron: '0 3 * * *'  # 3am UTC daily
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # 0 Python: ни setup-python, ни pip (networkx/numpy/scipy/validator) — весь nightly на Go.
      - name: Build archlint + nightly-report (Go)
        run: |
          go build -o bin/archlint ./cmd/archlint/
          go build -o bin/nightly-report ./scripts/nightly-report/

      # Go-оркестратор: читает monitored-repos.yaml (Go-YAML) -> clone -> archlint scan --format json
      # -> health v2 (ERROR-class provable core) -> health-summary.json + Hugo-страницы.
      # health v2 != Python-методика — переход помечен явно (health_version + healthNote, не молча).
      - name: Nightly scan + health + Hugo pages (Go orchestrator, 0 Python)
        run: |
          bin/nightly-report monitored-repos.yaml bin/archlint scan-results site-content/scan "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Commit results
        run: |
          git config user.name 'archlint-bot'
          git config user.email 'bot@archlint.ru'
          git add scan-results/ site-content/
          git commit -m "nightly: scan results $(date +%Y-%m-%d)" || true
          git push || true
