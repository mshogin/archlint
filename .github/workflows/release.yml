name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  build:
    name: Build ${{ matrix.artifact }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Канонические имена ассетов (контракт внешних установщиков):
          # archlint-{os}-{arch}, os = linux|darwin (НЕ macos). Go-бинарь
          # занимает их после выпила Rust — имена обязаны сохраниться.
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: archlint-linux-amd64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: archlint-linux-arm64

          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: archlint-darwin-amd64

          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: archlint-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/archlint/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/archlint-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
          done

      - name: Generate SHA256 checksums
        working-directory: release
        run: |
          sha256sum archlint-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/archlint-*
            release/checksums-sha256.txt
