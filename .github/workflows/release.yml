name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            archlint-rs/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('archlint-rs/Cargo.lock') }}

      - name: Run Rust tests
        working-directory: archlint-rs
        run: cargo test --verbose

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: archlint-linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: archlint-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: archlint-darwin-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: archlint-darwin-arm64

    defaults:
      run:
        working-directory: archlint-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            archlint-rs/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('archlint-rs/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/archlint ../${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-go:
    name: Build Go ${{ matrix.artifact }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goarch: amd64
            goos: linux
            artifact: archlint-go-linux-amd64

          - os: ubuntu-latest
            goarch: arm64
            goos: linux
            artifact: archlint-go-linux-arm64

          - os: macos-latest
            goarch: amd64
            goos: darwin
            artifact: archlint-go-macos-amd64

          - os: macos-latest
            goarch: arm64
            goos: darwin
            artifact: archlint-go-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -o ${{ matrix.artifact }} ./cmd/archlint/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build, build-go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/archlint-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
          done

      - name: Generate SHA256 checksums
        working-directory: release
        run: |
          sha256sum archlint-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/archlint-*
            release/checksums-sha256.txt
