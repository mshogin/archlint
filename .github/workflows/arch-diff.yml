name: Architecture Diff

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  arch-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build archlint (Go)
        run: go build -o bin/archlint ./cmd/archlint/

      - name: Run architecture diff (Go delta vs origin/main)
        id: arch-diff
        run: |
          set -e
          git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
          # baseline ERROR-паттернов origin/main. cd+'.' КРИТИЧЕН: qname БЕЗ path-префикса
          # директории -> переносимо на scan HEAD (иначе все паттерны ложно-NEW).
          git worktree add --detach /tmp/main-tree origin/main
          ( cd /tmp/main-tree && "$GITHUB_WORKSPACE/bin/archlint" baseline . -o /tmp/main-baseline.json )
          # delta: НОВЫЕ ERROR-паттерны HEAD vs origin/main (SCC/слой/ISP/dead-code).
          # threshold большой -> абсолютный WARNING-порог отключён, остаётся только ERROR-регрессия.
          bin/archlint scan . --baseline /tmp/main-baseline.json --threshold 100000 --format json > /tmp/scan.json 2>/dev/null || true
          BLOCKING=$(jq -r '.blocking // 0' /tmp/scan.json)
          echo "blocking=$BLOCKING" >> "$GITHUB_OUTPUT"
          echo "json<<ARCHLINT_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/scan.json >> "$GITHUB_OUTPUT"
          echo "ARCHLINT_EOF" >> "$GITHUB_OUTPUT"

      - name: Parse and report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isPR = context.eventName === 'pull_request';
            const sha = isPR ? context.payload.pull_request.head.sha : context.sha;

            let blocking = 0;
            let total = 0;
            let cats = {};
            try {
              const scan = JSON.parse(`${{ steps.arch-diff.outputs.json }}`);
              blocking = scan.blocking || 0;
              total = scan.violations || 0;
              cats = scan.categories || {};
            } catch (e) {
              core.warning('Failed to parse archlint scan JSON: ' + e.message);
            }

            // НОВЫЕ ERROR-class паттерны vs origin/main -> блокируют PR.
            const newViolations = blocking;
            const state = newViolations > 0 ? 'failure' : 'success';
            const emoji = newViolations > 0 ? '!!' : 'ok';

            const catLines = Object.entries(cats)
              .map(([k, v]) => `| ${k} | ${v} |`)
              .join('\n');

            const body = [
              `## Architecture Diff Report [${emoji}]`,
              '',
              `**New ERROR-class violations vs main: ${newViolations}** (blocks PR if > 0)`,
              '',
              `Total violations incl. WARNING/INFO (non-blocking): ${total}`,
              '',
              catLines ? '| Category | Count |\n|----------|-------|\n' + catLines : '',
            ].join('\n');

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: state,
              description: `New ERROR violations vs main: ${newViolations}`,
              context: 'archlint/arch-diff',
            });

            if (isPR) {
              const prNumber = context.payload.pull_request.number;
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              const botComment = comments.data.find(
                c => c.body.includes('## Architecture Diff Report')
              );
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: body,
                });
              }
              core.info(`PR #${prNumber} commented with arch diff report`);
            }

            core.info(`arch-diff: new ERROR violations vs main = ${newViolations}`);
