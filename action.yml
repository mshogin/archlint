name: 'archlint - Architecture Review'
description: 'Automated architecture analysis for Go and Rust projects. SOLID violations, cycles, fan-out, performance metrics.'
author: 'mikeshogin'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  directory:
    description: 'Directory to scan'
    required: false
    default: '.'
  format:
    description: 'Output format: json, brief'
    required: false
    default: 'brief'
  threshold:
    description: 'Max violations before failing (0 = no limit)'
    required: false
    default: '0'
  comment:
    description: 'Post results as PR comment (true/false)'
    required: false
    default: 'true'

outputs:
  components:
    description: 'Number of components found'
  violations:
    description: 'Number of violations found'
  health_score:
    description: 'Architecture health score (0-100)'

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache-dependency-path: ${{ github.action_path }}/go.sum

    - name: Build archlint
      shell: bash
      run: |
        cd ${{ github.action_path }}
        go build -o "${{ github.action_path }}/archlint" ./cmd/archlint/

    - name: Run architecture scan
      id: scan
      shell: bash
      run: |
        # --signals: даёт structural-дескрипторы (componentCount/maxFanOut) в JSON.
        RESULT=$("${{ github.action_path }}/archlint" scan ${{ inputs.directory }} --format json --signals 2>/dev/null)

        # Семантическая сохранность outputs (контракт чужих workflow):
        #  components = ЧИСЛО КОМПОНЕНТ СВЯЗНОСТИ (signals.componentCount) — тот же
        #    смысл, что Rust metrics.component_count (НЕ число узлов).
        #  violations = общее число нарушений (top-level violations, int).
        #  cycles     = число циклических зависимостей (categories['circular-dependency'],
        #    один violation на SCC -> = число циклов, как Rust metrics.cycles).
        #  max_fan_out = signals.maxFanOut.
        COMPONENTS=$(echo "$RESULT" | python3 -c "import sys,json; s=json.load(sys.stdin).get('signals') or {}; print(s.get('componentCount',0))")
        VIOLATIONS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('violations',0))")
        CYCLES=$(echo "$RESULT" | python3 -c "import sys,json; c=json.load(sys.stdin).get('categories') or {}; print(c.get('circular-dependency',0))")
        MAX_FANOUT=$(echo "$RESULT" | python3 -c "import sys,json; s=json.load(sys.stdin).get('signals') or {}; print(s.get('maxFanOut',0))")

        # Health score: 100 - (violations * 5) - (cycles * 10) — та же формула на тех же входах.
        HEALTH=$((100 - VIOLATIONS * 5 - CYCLES * 10))
        if [ $HEALTH -lt 0 ]; then HEALTH=0; fi

        echo "components=$COMPONENTS" >> $GITHUB_OUTPUT
        echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
        echo "health_score=$HEALTH" >> $GITHUB_OUTPUT

        echo "## Architecture Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Components | $COMPONENTS |" >> $GITHUB_STEP_SUMMARY
        echo "| Violations | $VIOLATIONS |" >> $GITHUB_STEP_SUMMARY
        echo "| Cycles | $CYCLES |" >> $GITHUB_STEP_SUMMARY
        echo "| Max fan-out | $MAX_FANOUT |" >> $GITHUB_STEP_SUMMARY
        echo "| Health score | $HEALTH/100 |" >> $GITHUB_STEP_SUMMARY

        # Fail if threshold exceeded
        if [ "${{ inputs.threshold }}" != "0" ] && [ "$VIOLATIONS" -gt "${{ inputs.threshold }}" ]; then
          echo "::error::Architecture violations ($VIOLATIONS) exceed threshold (${{ inputs.threshold }})"
          exit 1
        fi

    - name: Comment on PR
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const components = '${{ steps.scan.outputs.components }}';
          const violations = '${{ steps.scan.outputs.violations }}';
          const health = '${{ steps.scan.outputs.health_score }}';
          const body = `## 🏗️ Architecture Review by archlint

          | Metric | Value |
          |--------|-------|
          | Components | ${components} |
          | Violations | ${violations} |
          | Health Score | ${health}/100 |

          _Powered by [archlint](https://github.com/mshogin/archlint)_`;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: body
          });
