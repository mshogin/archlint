# Self-оракул archlint: размеченные ожидания по принципам для self-эталона.
# Принцип разметки: ПО МЕРЕ реализации метрик (status: implemented|planned|inactive).
# planned/inactive несут только whitelist_rules (наводки), БЕЗ фейковых expected
# (анти-мёртвая-разметка). expected заполняется ТОЛЬКО у implemented.

version: 1

corpus:
  core: archlint-self        # обязательное ядро (необходимо, НЕ достаточно)
  extends: []                # позже: размеченные репо (анти-overfit к одному графу)

principles:
  - id: no-cycles
    metric: scc-modules       # Tarjan SCC (gonum topo.TarjanSCC), internal/mcp/tools.go
    status: implemented
    assert: "0 SCC размера>1 в ПАКЕТНОМ dependsOn-графе archlint"
    granularity: package      # КРИТИЧНО: функц./тип. рекурсия НЕ нарушение; SCC только на пакетном уровне.
                              # Без pin реализация прогонит SCC на функц. уровне (рекурсия легальна) -> verified-pass ложный.
    whitelist: []             # пусто: цикл пакетных зависимостей ВСЕГДА дефект (Go self-import невозможен -> SCC>1 = полный критерий)
    verified:
      status: pass
      evidence: ["python validate_dag PASSED", "Tarjan golden case 1"]   # два независимых сигнала
    on_fire: real-defect      # срабатывание на self = реальный цикл -> чинить archlint (НЕ зарезать метрику)
    on_divergence: fail-fast  # факт != expected -> ручной разбор (самозванец vs дефект)

  - id: isp
    metric: isp-usage-subset
    status: implemented        # Go-порт internal/mcp/isp.go; промотирован в ERROR после self-прогона (0 false-fire)
    metric_input_required: "ЧИСЛИТЕЛЬ — calls привязан к методу
      интерфейса по СТАТИЧЕСКОМУ типу receiver (i.Foo() где i типа I -> calls(C->I.Foo)).
      Статический тип объявления, НЕ value-flow. Знаменатель(contains)+coupling(usesType) готовы."
    severity_class: ERROR-with-2-guards   # ERROR-able с guard'ами; иначе WARNING (false-fire на кондуитах)
    soundness_guards:         # ПРЕДУСЛОВИЕ порта (без guard'ов -> WARNING, не в проверку соундности)
      - "guard1: i ТОЛЬКО receiver, НИКОГДА не value-позиция (форвард -> no-verdict)"
      - "guard2: клиент-метод НЕ реализует интерфейс (контракт-связан -> suppress/WARNING)"
      - "свой интерфейс+свой клиент = ERROR; внешний (io.*) = WARNING"
      - "не-param-typed формы (var/struct/returns-receiver) = no-verdict (дешёвая сторона)"
    class: closed-world-on-subdomain   # воздержание вне поддомена; cost=irritation; guard+дельта, БЕЗ тройного замка
    repromotion_criterion:    # проверка соундности ISP: чисто = 0 false-ISP-ERROR
      - "каждый ISP-ERROR: строгое подмножество + i не форвардится + не контракт + СВОЙ интерфейс + сужаем"
      - "конфаунды не стреляют: кондуиты подавлены, внешние->WARNING, не-param->no-verdict"
      - "критерий = 0 FALSE-fire (не число находок); любой false-fire -> чинить guard, не промотировать"
    whitelist_rules:
      - "широкие ВНЕШНИЕ интерфейсы (io.*, stdlib, сторонние) при узком использовании — WARNING (не ERROR)"
      - "СВОИ широкие интерфейсы при узком клиенте, i не форвардится — ERROR (реальный запах, сужаем)"
    verified:
      status: pass            # self-прогон 2026-06-15: archlint scan на собственном коде
      false_fire: 0           # критерий промотации выполнен
      findings: 9             # все isp-usage-subset на своём интерфейсе StateReader (4 метода)
      evidence:
        - "9 срабатываний — узкие клиенты-функции handleX(state StateReader), используют 1..3 из 4 методов"
        - "каждое: строгое подмножество + state НЕ форвардится (guard1 чист) + клиент-функция (guard2 n/a) + свой интерфейс — валидный ERROR, не false-fire"
        - "конфаунды молчат: внешних io.* срабатываний нет; ни одного no-verdict ложно-промотированного"
      on_fire: real-defect     # срабатывание на self = реальный широкий интерфейс -> сужать клиента (не резать метрику)
      on_divergence: fail-fast # факт != expected -> ручной разбор (самозванец vs дефект)

  - id: dip
    metric: dip-abstraction-to-detail
    status: implemented
    severity_class: WARNING-max   # ДЕМОТИРОВАН из ERROR: "деталь" семантична, не в графе.
                                  # ERROR-кор (DIP с импортным циклом) держит SCC. Никогда не ERROR.
    self_baseline:                # разметка для регрессии на self; DIP=WARNING
      whitelist:                  # легальные DTO/value-возвраты = словарь абстракции, НЕ деталь
        - "MetricsProvider/StateReader -> Report/Graph/FileMetrics/DegradationReport (DTO)"
        - "callgraph.Analyzer -> CallInfo/FunctionInfo/MethodInfo/TypeInfo (DTO)"
        - "bot.* -> Issue/ScanResult; mcp.DIPView -> OutEdge (DTO); demo-фикстура"
      real_smell_warning:         # настоящий запах archlint (WARNING, чинить — backlog, не блок)
        - "#8 StateReader -> GoAnalyzer (конкретный поведенческий коллаборатор)"
        - "#10 StateReader -> DegradationDetector (то же)"
    note: "ранжирование WARNING эвристикой DTO/behavioral — опц. backlog (UX), никогда не ERROR"
    warning_criterion:             # WARNING-проверка (зеркало ERROR, критерий иной — сигнал, не блок):
      - "W1-привязка: STRICT-DIP fire = ребро abstract(interface)->concrete(свой); term ⊇ Def_DIP
         (НАДМНОЖЕСТВО: не различает concrete-с-поведением и DTO) -> WARNING, не ERROR"
      - "W1/W2 0-FALSE-SILENCE: больной abstract->concrete-с-поведением ОБЯЗАН fire"
      - "W3 НАПРАВЛЕННОСТЬ: улучшение (concrete-зависимость -> интерфейс) НЕ растит метрику (нет инверсии)"
      - "DTO-кейс = LEGAL FP (precision<1): abstract->concrete-DTO fire, whitelist держит -> НЕ демотировать"
    verified:
      status: pass                 # self-проверка 2026-06-15 (TestDIP_WarningSoundness)
      evidence:
        - "0-FALSE-SILENCE: abstract(interface)->concrete (uses) -> fire (метрика не молчит на больном)"
        - "не always-fire: abstraction->abstraction (правильный DI) -> НЕ fire"
        - "W3 без инверсии: concrete-зависимость заменена на интерфейс -> fire 1->0 (улучшение не растит метрику)"
        - "DTO-кейс: abstract->concrete-DTO -> fire=1 = LEGAL FP (whitelist держит на гейте, не инверсия/не silence)"
    on_fire: design-signal         # сигнал суждения; ERROR-кор (DIP+импортный цикл) держит SCC

  - id: srp-decomposability
    metric: srp-lack-of-cohesion   # LCOM4>=2 (metrics.go); число компонент графа методов
    status: implemented
    severity_class: WARNING        # сигнал декомпозируемости, НЕ блок (SRP структурно недоказуем)
    warning_criterion:             # WARNING-проверка = ЗЕРКАЛО ERROR self-проверки, критерий ДРУГОЙ:
      - "НЕ 0-false-fire на здоровом (это ERROR-ворота, к WARNING не применять; FP легален, precision<1)"
      - "W1/W2 0-FALSE-SILENCE: больной синтет-эталон (God-class, >=2 непересек. групп, viol по конструкции)
         ОБЯЗАН fire (LCOM4>=2)"
      - "W3 НАПРАВЛЕННОСТЬ: легальное улучшение (разбиение God на когезивные типы) НЕ повышает метрику
         (осколки LCOM4=1, нет инверсии знака)"
    verified:
      status: pass                 # self-проверка 2026-06-15 (TestSRPDecomposability_WarningSoundness)
      evidence:
        - "0-FALSE-SILENCE: God-class (2 disjoint группы вызовов) -> LCOM4=2 -> fire (метрика не молчит на больном)"
        - "не always-fire: когезивный тип (цепочка вызовов) -> LCOM4=1 -> НЕ fire (метрика различает)"
        - "W3 без инверсии: разбиение God -> 2 осколка LCOM4=1 каждый, max=1 < God=2 (улучшение НЕ растит метрику)"
      caveat: "реализация LCOM4 (lcom4.go) строит граф ТОЛЬКО по взаимным вызовам, без shared-field рёбер
        (TODO в коде) — расходится с декларацией карточки 'поле ИЛИ вызов'. FP-источник (когезивный-через-поля
        тип ложно сработает), для WARNING легально; decomposability доказывается по подграфу вызовов."
    on_fire: design-signal         # кандидат на декомпозицию (суждение), НЕ авто-дефект

  - id: layers-A
    metric: scc-modules       # тот же механизм что no-cycles (один детектор, две карточки)
    status: implemented
    granularity: package      # тот же pin: SCC на пакетном уровне
    verified:
      status: pass
      evidence: ["тот же прогон Tarjan, что no-cycles"]
    assert: "0 SCC среди пакетов"
    whitelist: []

  - id: layers-B
    metric: layer-backedge
    status: implemented       # ERROR; активирован (Уровень B)
    severity_class: ERROR     # closed-world относительно ОБЪЯВЛЕННОГО порядка слоёв
    order_source: "ПОЗИЦИЯ в списке cfg.layers (single source of truth, без дубль-order;
      список сверху-вниз: верхние слои -> нижние)"
    soundness: "ребро снизу-вверх (fromRank > toRank) против порядка = паттерн
      по определению (односторонняя импликация)"
    granularity: edge         # назначение узла слою по path-prefix (LayerForModule)
    activation: "conditional: неактивен без layers-конфига (self-прогон archlint = 0)"
    delta: "generic дельта-гейт (блок НОВОГО back-edge)"
    whitelist: []

  - id: forbidden-dependencies
    metric: forbidden-dependency
    status: implemented       # ERROR; config-driven (.archlint forbidden: [{from,to}])
    severity_class: ERROR     # closed-world относительно объявленного запрета
    soundness: "объявленное запрещённое ребро = ПАТТЕРН по определению
      (односторонняя импликация срабатывание⟹дефект; порог не нужен)"
    granularity: edge         # substring(from) in source AND substring(to) in target
    activation: "inactive без forbidden-правил в конфиге (0 ложных по умолчанию)"
    delta: "RequiresDelta=false (соунд относительно конфига); дельта-гейт = usability
      на легаси (блок НОВОГО запрещённого ребра), generic через EffectiveLevel"
    whitelist: []

  - id: deprecated-usage
    metric: deprecated-usage
    status: implemented       # ERROR; маркер-driven (config-паттерны или атрибут `deprecated`)
    severity_class: ERROR     # closed-world относительно ЯВНЫХ deprecated-маркеров
    soundness: "ребро в помеченный deprecated-узел = дефект по определению
      (односторонняя импликация); маркер ЯВНЫЙ -> срабатывание⟹дефект"
    granularity: edge         # in-edge в deprecated-узел от не-deprecated источника
    note: "ОТЛИЧИЕ ОТ Python: НЕ берём широкие дефолты (legacy/old/v1 ложно-стреляют);
      только явные маркеры (config deprecated_patterns или node-атрибут deprecated)"
    activation: "inactive без явных маркеров (0 ложных по умолчанию; self-прогон = 0)"
    delta: "generic дельта-гейт (блок НОВОГО использования deprecated)"
    whitelist: []

  - id: ghost-components
    metric: ghost-component
    status: implemented       # ERROR; behaviour-порт, conditional на .archlint contexts
    severity_class: ERROR     # closed-world относительно объявленных контекстов
    soundness: "компонент в контексте, отсутствующий в графе = устаревшая декларация
      (односторонняя импликация ghost⟹дефект)"
    granularity: component    # fuzzy-матч (нормализация=последний сегмент + двунапр. substring)
    activation: "inactive без contexts (self-проверка соундности: self-прогон archlint = 0)"
    soundness_check: "0 ghost на здоровом archlint (нет contexts -> неактивен), conditional как forbidden"
    delta: "generic дельта-гейт (блок НОВОГО ghost vs baseline)"
    contract: "★ДОПУЩЕНИЕ (обязательная компенсация, как R-полнота у dead-code):
      contexts ОПИСЫВАЮТ СУЩЕСТВУЮЩУЮ архитектуру для проверки соответствия, НЕ
      planned-roadmap. Объявленный компонент ОБЯЗАН существовать в графе. ghost =
      open-world-условный ERROR ПРИ ЭТОМ контракте. Если контексты станут
      частичными/planned-допускающими -> ДЕМОТИРОВАТЬ в WARNING (соунд только при явном контракте)."
    whitelist: []

  - id: context-coverage
    metric: context-coverage
    status: demoted           # ВЕРДИКТ СОУНДНОСТИ: WARNING-сигнал, НЕ ERROR
    severity_class: WARNING   # три слоя магнитуды/интента + data-конфаунд класса DIP
    soundness_check: "репрезентативная проверка на реальном archlint (контекст core={mcp,analyzer}):
      coverage=0.50, uncovered=model.Graph/Node/Edge = фундаментальные data-узлы (высокий
      PageRank) = ЛЕГИТИМНАЯ структура, не дефекты"
    verdict: "intent-laden (топ-N PageRank + порог 0.8 + выбор контекста архитектором),
      синтаксического guard нет -> под --signals (coverage-ratio + uncovered), не гейт"

  - id: articulation-points
    metric: articulation-point
    status: demoted           # ВЕРДИКТ СОУНДНОСТИ: WARNING-сигнал, НЕ ERROR
    severity_class: WARNING   # семантический конфаунд класса DIP
    soundness_check: "44 срабатываний на здоровом archlint = легитимная структура
      (единый вход парсинга, фасады, тест-моки); фасад=articulation по определению"
    verdict: "интент синтаксически неотделим -> демотация (как DIP); под --signals, не гейт"

  - id: bridge-edges
    metric: bridge-edge
    status: demoted           # WARNING/INFO loose-coupling дескриптор
    severity_class: INFO      # мост чаще = здоровая модульность, не дефект
    soundness_check: "70 на здоровом self; bridge = признак слабой связанности (здоровье)"
    verdict: "дескриптор связанности под --signals, не ERROR"

  - id: stability-violations
    metric: stability-violation
    status: demoted           # INFO-дескриптор + регрессия-WARNING в дельте
    severity_class: INFO      # чистая магнитуда SDP (I=ратио+произвольный порог)
    soundness_check: "85 на здоровом self; класс instability/coupling (магнитуда, не паттерн)"
    verdict: "INFO-дескриптор под --signals; регрессия-WARNING в дельте; не ERROR"

  - id: dead-code
    metric: reach-from-entrypoints
    status: implemented       # ПРОМОТИРОВАН в ERROR; первый open-world ERROR
    severity_class: ERROR     # open-world условно-соундный; компенсации ОБЯЗАТЕЛЬНЫ
    verified:
      status: pass
      result: "89->5 мёртвых, 0 false-dead; 5 реальных находок (первичная проверка соундности чиста)"
      reverify_2026_06_15: "свежий self-прогон -> 0 находок (5 реальных мёртвых вычищены: readFileLines/
        isInPackage/printStats/mcp.analyzeCode/mcp.writeAndAnalyze). 0 false-dead держится. NB: cli.analyzeCode
        жив (вызов в collect) — отделён от удалённого mcp.analyzeCode по qname-пакету. Дискриминатор не
        вырожден (TestDeadCode_CallsReachAndOrphan ловит orphan); защита от false-dead через implements-
        dispatch доказана TestDeadCode_ImplementsDispatch. ERROR подтверждён соундным."
      validations:
        - "qname-идентичность точнее грепа (коллизия одноимённых функций развелась по пакету автоматически)"
        - "граница test-only эмпирична (функция, вызываемая тестом, живая; осиротевшие тест-хелперы мёртвы)"
    mandatory_compensations:  # следствие open-world условности, не опция
        - "дельта-режим (новый мёртвый vs baseline, не абсолют)"
        - "тройной замок (R общие механизмы / дельта / чистая self-проверка соундности)"
        - "авто-удаление human-in-loop (ERROR-сигнал != авто-действие)"
    self_findings_to_fix:     # archlint чинит САМ (human-in-loop), не метрику
        - "прод: readFileLines, isInPackage, printStats (удалить)"
        - "осиротевшие тест-хелперы: mcp.analyzeCode, mcp.writeAndAnalyze (удалить)"
        - "протухшие комменты: 'used in tests' / 'used by all reach-SRP tests' (оба врут)"
    whitelist_rules:
      - "R (entry points) = КОНФИГ .archlint entrypoints + правила триггер-фреймворков (НЕ эвристика)"
      - "для библиотеки R = все exported символы (детерминировано, авто)"
      - "рефлексия/codegen/регистрируемые колбэки -> explicit entry-маркеры в whitelist"
      - "ложно-мёртвый (неполный R) убивает ЖИВОЙ код -> R консервативен (полон с запасом)"
      - "AUTO-FIX (удаление) по мёртвому коду НЕ автоматичен без подтверждения человека"
      - "ОБЯЗАТЕЛЬНО: reach раскрывает implements-dispatch (interface-method достижим"
      - " ⟹ все реализации via implements достижимы). Иначе ложно-мёртвые impl интерфейсов = удалили живое"
      - "references материализуются как СИНТАКСИЧЕСКИЙ value-use"
      - " (символ func/метода в не-call позиции, over-approx по имени)."
      - " Без этого callback-F без входящего ребра -> reach флагует МЁРТВОЙ -> ложно-мёртвый (дорого)."
      - " Это НЕ var-type inference (синтаксис, арх-уровень)."
    acceptance_criteria_phase3:   # dead-code-соундность стоит на ТРЁХ over-approx одновременно;
                                  # любая под-approx -> false-dead (destruction)
      - "1. references = ИСТИННАЯ over-approx (синтакс. value-use -> рёбра на ВСЕ одноимённые);
            references!=0; callback-only функция получает входящее ref-ребро -> reachable -> не мёртва"
      - "2. dispatch: reach раскрывает interface-method достижим ⟹ все over-approx реализации (implements)"
      - "3. entry-points R = КОНФИГ (не эвристика) + библиотека=все exported авто; пропущенный entry =
            false-dead (ВТОРОЙ линчпин рядом с references)"
      - "КОМПОЗИТ: на чистом self-прогоне КАЖДЫЙ флагнутый-мёртвым проверяется вручную = реально ли
            мёртв. Хоть один живой -> destruction-несоунден -> демотация/фикс (как DIP). ERROR только при 0 false-dead"
      - "4. АСИММЕТРИЯ: ERROR-СИГНАЛ ок при чистой проверке соундности, но АВТО-УДАЛЕНИЕ = human-in-loop"
      - "вероятный исход: reachability = чистый ПАТТЕРН -> устоит как ERROR (в отличие от DIP-семантики),
            НО только если все 3 входа = true-over-approx; иначе демотация"

# ============================================================
# ИНФРАСТРУКТУРА (не принцип, а слой активации) — пре-регистрация проверки соундности
# ============================================================
infrastructure:
  - id: delta-gate
    desc: "дельта-режим (Фаза 5): соундность-сохраняющая АКТИВАЦИЯ над уже-соундными паттернами"
    status: verified            # реализован и верифицирован по коду; Фаза 5 закрыта, боевой гейт активен
    backlog_robustness: "развязать SCC/layer-fingerprint от display-строки -> структурное поле (member-qname); смена формата сообщения иначе инвалидирует baseline (mass-false-block). Низкий приоритет, после ISP."
    design:
      - "baseline-снапшот паттерн-фактов -> .archlint-baseline.json"
      - "дельта current-vs-baseline -> NEW-множество (generic по Kind из severity_class)"
      - "идентичность = СТРОГИЙ qname-key (dead:qname; back-edge:пара; SCC:отсортир.множество/хеш; ISP:пара)"
      - "НЕ rename-tracking/fuzzy (Ось-1 запрет магнитудного матча на гейте); rename->ложный-NEW=irritation ок"
